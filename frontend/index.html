  <style>

  <style>
    :root{--bg:#05080d;--card:#0b1119;--card-2:#0e1621;--ink:#eef6ff;--muted:#8290a3;--line:#1d2a38;--teal:#18d4c3;--blue:#4d8dff;--coral:#ff655d;--warning:#f3b64b;--shadow:none;color-scheme:dark}

    .module-title{display:flex;align-items:center;gap:10px;min-width:0}.module-title svg{width:18px;height:18px;color:var(--teal)}
    .module-title h2,.module-title h3{margin:0;font-size:15px;line-height:1.25;letter-spacing:0}.module-title p{margin:3px 0 0;color:var(--muted);font-size:11px;line-height:1.35}
    .signal{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:11px;white-space:nowrap}.signal::before{content:"";width:7px;height:7px;border-radius:50%;background:#526172}.signal.on::before{background:var(--teal);box-shadow:0 0 10px rgba(24,212,195,.8)}.signal.warn::before{background:var(--warning)}.signal.error::before{background:var(--coral)}
    .command-row{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:14px;padding-right:92px}
    .command-panel,.agent-panel{padding:14px 16px;min-height:116px}
    .command-label{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.command-label b{font-size:12px;color:#c5d1df}.command-label span{font-size:11px;color:var(--muted)}
    .command-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.command-tools .n-button{border-radius:6px}.compact-input{width:112px}
    .agent-panel{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;border-color:rgba(77,141,255,.34)}
    .agent-copy{min-width:0}.agent-kicker{display:flex;align-items:center;gap:8px;color:var(--blue);font-size:11px;font-weight:700;text-transform:uppercase}.agent-copy h3{margin:8px 0 4px;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.agent-copy p{margin:0;color:var(--muted);font-size:12px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.agent-count{min-width:72px;text-align:right}.agent-count strong{display:block;font-size:28px;color:var(--warning)}.agent-count span{font-size:11px;color:var(--muted)}
    .driver-core{display:grid;grid-template-columns:minmax(0,2.15fr) minmax(300px,.85fr);gap:14px;align-items:stretch}
    .road-module{display:flex;flex-direction:column;min-height:720px}.road-module .module-head{flex:0 0 auto}.road-stage{position:relative;flex:1;min-height:520px;background:#03070c;overflow:hidden}
    .road-stage img,.road-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:contain;background:#03070c}
    .road-stage .assist-banner{left:16px;top:16px;right:16px;border-radius:6px;background:rgba(5,8,13,.86);border-color:#233344}
    .road-stage .overlay{left:16px;right:16px;bottom:14px}.road-stage .overlay span{border-radius:5px;background:rgba(5,8,13,.88);border-color:#27384a}
    .road-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:38px;height:56px;border:1px solid #30445a;border-radius:6px;background:rgba(5,8,13,.82);color:#dcecff;display:grid;place-items:center;cursor:pointer}.road-nav:hover{border-color:var(--teal);color:var(--teal)}.road-nav.prev{left:14px}.road-nav.next{right:14px}.road-nav svg{width:20px;height:20px}
    .road-footer{padding:12px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}.road-footer .n-select{min-width:230px;flex:1}
    .driver-stack{display:grid;grid-template-rows:minmax(240px,1.1fr) minmax(210px,.9fr) minmax(190px,.8fr);gap:14px;min-width:0}
    .cabin-module,.vehicle-module,.music-module{display:flex;flex-direction:column;min-height:0}
    .cabin-module.expanded{position:fixed;inset:18px;z-index:1100;background:#070c13;border-color:#2c4962;box-shadow:0 24px 80px rgba(0,0,0,.65)}.cabin-module.expanded .cabin-view{min-height:0}.cabin-module.expanded .phone-call{position:absolute;left:18px;right:18px;bottom:66px;z-index:5;border:1px solid #244157;border-radius:6px}.cabin-module.expanded .cabin-actions{min-height:56px}
    .cabin-view{position:relative;flex:1;min-height:170px;background:#03070c;overflow:hidden}.cabin-view img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.cabin-view .control-lock{border-radius:7px;min-width:75%;padding:10px}.cabin-view .control-lock b{font-size:14px}.cabin-view .overlay{left:10px;right:10px;bottom:9px}.cabin-view .overlay span{border-radius:4px}
    .cabin-actions{padding:10px 12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center}.cabin-actions .state-tags{display:flex;gap:6px;min-width:0}
    .phone-call{margin:0;border-radius:0;border-width:1px 0 0;padding:10px 12px;background:#101b24;box-shadow:none}.phone-avatar{border-radius:6px;background:#186f76}
    .vehicle-body{display:grid;gap:8px;padding:12px}.vehicle-row{min-height:44px;border-radius:6px;padding:9px 10px;background:#0e1722;border:1px solid #182637}.vehicle-row label{color:#9aabc0}.vehicle-row .n-slider{max-width:170px}
    .music-body{padding:14px;display:grid;gap:13px;flex:1}.now-playing{display:flex;align-items:center;justify-content:space-between;gap:12px}.track-copy{min-width:0}.track-copy b,.track-copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.track-copy b{font-size:17px}.track-copy span{margin-top:4px;color:var(--muted);font-size:11px}.play-state{font-size:11px;color:var(--teal);white-space:nowrap}.music-progress{height:5px;border-radius:999px;background:#1a2837;overflow:hidden}.music-progress span{display:block;height:100%;background:var(--teal)}.music-controls{display:flex;justify-content:center;gap:9px}.music-controls .n-button{border-radius:6px}
    .traffic-test-panel{grid-column:auto;border-radius:8px;padding:0;background:rgba(11,17,25,.96)}.traffic-test-panel>.head{min-height:52px;margin:0;padding:12px 14px;border-bottom:1px solid var(--line);align-items:center}.traffic-test-panel>.head .title{gap:10px}.traffic-test-panel>.head .ico{width:32px;height:32px;border-radius:6px;background:#112b31}.traffic-test-panel>.head h3{font-size:15px}.traffic-test-panel>.head .hint{font-size:11px}.traffic-workspace{grid-template-columns:minmax(0,1.8fr) minmax(260px,.55fr);padding:14px}.traffic-viewer{min-height:420px;border-radius:6px;border-color:#24364a}.traffic-summary-row{border-radius:5px;background:#0e1722;border:1px solid #182637}.traffic-summary-row span{color:#8fa0b5}.traffic-counts .n-tag{border-radius:4px}
    .admin-core{display:grid;grid-template-columns:minmax(0,1.75fr) minmax(320px,.65fr);gap:14px}.admin-camera .camera-stage{position:relative;aspect-ratio:16/9;background:#03070c}.admin-camera .camera-stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.admin-side{display:grid;gap:14px;grid-template-rows:minmax(210px,.8fr) minmax(320px,1.2fr)}.compact-result,.compact-alerts{padding:12px;overflow:auto}.compact-result{max-height:360px}.compact-result pre{margin:0;white-space:pre-wrap;color:#aebdd0;font-size:11px;line-height:1.55}.compact-alerts{display:grid;gap:8px}.compact-alert{padding:10px;border:1px solid #1c2b3b;border-radius:5px;background:#0e1722}.compact-alert b{font-size:12px}.compact-alert p{margin:5px 0 0;color:var(--muted);font-size:11px;line-height:1.45}
    .admin-files{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}.file-body{padding:14px}.file-drop{min-height:110px;border:1px dashed #31506e;border-radius:6px;display:grid;place-items:center;text-align:center;padding:16px;cursor:pointer;background:#09111a}.file-drop p{margin:5px 0 0;color:var(--muted);font-size:11px}
    .auth-stage{background:#05080d;color:var(--ink)}.auth-panel{border-radius:8px;background:#0b1119;border-color:#223246;box-shadow:0 24px 80px rgba(0,0,0,.5)}.auth-panel p,.auth-panel .hint{color:var(--muted)}.auth-tab,.auth-role,.auth-method{border-radius:6px;background:#0e1722;border-color:#26384b;color:#c7d5e4}.auth-tab.on,.auth-role.on,.auth-method.on{background:#102a2d;border-color:#1aa99c;color:#7ff3e8}
    .n-button{letter-spacing:0}.hidden{display:none!important}
    @media(max-width:1080px){.command-row{grid-template-columns:1fr;padding-right:76px}.driver-core,.admin-core{grid-template-columns:1fr}.road-module{min-height:620px}.driver-stack{grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:none}.admin-side{grid-template-columns:1fr 1fr;grid-template-rows:none}}
    @media(max-width:760px){.cockpit-app{padding:14px 10px 24px}.session-exit{right:10px;top:10px}.command-row{padding-right:62px}.command-panel,.agent-panel{padding:12px}.command-tools{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.command-tools .n-button{padding-inline:8px}.compact-input{width:100%}.agent-panel{grid-template-columns:1fr auto}.road-module{min-height:0}.road-stage{min-height:0;aspect-ratio:16/9}.road-stage .assist-banner{left:10px;right:10px;top:10px;padding:8px}.road-stage .assist-banner span{display:none}.road-stage .assist-banner b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.road-footer .n-select{min-width:100%}.driver-stack{grid-template-columns:1fr}.traffic-workspace{grid-template-columns:minmax(0,1fr);padding:10px}.traffic-viewer{min-height:0}.admin-side,.admin-files{grid-template-columns:1fr}.module-title p{display:none}}
    .replay-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}.replay-progress{flex:1;min-width:120px;font-size:12px;color:var(--muted)}.replay-event-card{padding:14px;border:1px solid var(--line);border-radius:7px;background:var(--card-2);margin-bottom:14px}.replay-event-card .replay-time{font-size:11px;color:var(--muted);margin-bottom:6px}.replay-dots{display:flex;gap:3px;flex-wrap:wrap;max-height:80px;overflow:auto;padding:8px 0}.replay-dot{width:9px;height:9px;border-radius:50%;background:var(--line);flex-shrink:0;cursor:pointer;transition:all .15s}.replay-dot:hover{transform:scale(1.4)}.replay-dot.current{background:var(--teal);transform:scale(1.5);box-shadow:0 0 8px rgba(24,212,195,.5)}.replay-dot.critical{background:#ff3b30}.replay-dot.error{background:var(--coral)}.replay-dot.warning{background:var(--warning)}.replay-dot.info{background:var(--blue)}.replay-speed{margin-left:8px}.empty-state{padding:40px 20px;text-align:center;color:var(--muted)}.event-replay-section{margin-bottom:14px}
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <n-config-provider :theme="darkTheme" :theme-overrides="theme">
      <n-message-provider>
        <div v-if="!isAuthed" class="auth-stage" @keyup.enter="submitAuth">
          <section class="auth-panel">
            <div class="title"><div class="ico"><i data-lucide="radar"></i></div><div><h1>IRV 登录</h1><p>进入管理者端或车主端，认证信息会加密保存在本机浏览器。</p></div></div>
            <div class="auth-tabs"><button class="auth-tab" :class="{on:auth.mode==='login'}" @click="switchAuthMode('login')">登录</button><button class="auth-tab" :class="{on:auth.mode==='register'}" @click="switchAuthMode('register')">注册</button></div>
            <div class="auth-roles"><button class="auth-role" :class="{on:auth.role==='admin'}" @click="chooseAuthRole('admin')"><b>管理者端</b><span>车牌、摄像头与 Agent 告警</span></button><button class="auth-role" :class="{on:auth.role==='driver'}" @click="chooseAuthRole('driver')"><b>车主端</b><span>驾驶辅助与手势控车</span></button></div>
            <div v-if="auth.mode==='login'" class="auth-methods"><button class="auth-method" :class="{on:auth.method==='password'}" @click="switchAuthMethod('password')">密码</button><button class="auth-method" :class="{on:auth.method==='code'}" @click="switchAuthMethod('code')">验证码</button></div>
            <div class="auth-form">
              <n-input v-if="auth.mode==='register'" v-model:value="auth.displayName" placeholder="显示名称"></n-input>
              <n-input v-if="auth.mode==='register'||auth.method==='password'" v-model:value="auth.username" placeholder="账号"></n-input>
              <n-input v-if="auth.mode==='register'||auth.method==='password'" v-model:value="auth.password" type="password" show-password-on="click" placeholder="密码"></n-input>
              <n-input v-if="auth.mode==='register'||auth.method==='code'" v-model:value="auth.contact" placeholder="邮箱或手机号"></n-input>
              <n-input v-if="auth.mode==='register'" v-model:value="auth.confirm" type="password" show-password-on="click" placeholder="确认密码"></n-input>
              <div v-if="auth.mode==='login'&&auth.method==='code'" class="line"><n-input v-model:value="auth.code" placeholder="验证码"></n-input><n-button secondary :loading="auth.sending" @click="sendAuthCode">发送</n-button></div>
              <div class="auth-error">{{auth.error}}</div>
              <div class="line"><n-button tertiary @click="fillDemo"><template #icon><i data-lucide="key-round"></i></template>演示账号</n-button><n-button type="primary" :loading="auth.loading" @click="submitAuth"><template #icon><i :data-lucide="auth.mode==='register'?'user-plus':'log-in'"></i></template>{{auth.mode==='register'?'完成注册':'进入系统'}}</n-button></div>
              <p class="hint">后端已接入 `/api/auth`，密码使用 PBKDF2 加盐哈希，联系方式只存 HMAC 摘要；浏览器会优先使用 AES-GCM 保存会话。</p>
            </div>
          </section>
        </div>
        <div v-else class="cockpit-app">
          <n-button class="session-exit" quaternary size="small" @click="logout"><template #icon><i data-lucide="log-out"></i></template>登出</n-button>
          <main class="cockpit-shell">
            <template v-if="role==='driver'">
              <section class="command-row">
                <div class="cockpit-module command-panel"><div class="command-label"><b>快捷控制</b><span>{{sessionUser?.displayName||sessionUser?.username}} · 车主</span></div><div class="command-tools"><n-input-number class="compact-input" v-model:value="cameraIndex" :min="0" :max="10" placeholder="摄像头"></n-input-number><n-button type="primary" :loading="loading.gesture" @click="startGestureWebcam"><template #icon><i data-lucide="video"></i></template>启动摄像头</n-button><n-button secondary :disabled="!gesture.running" @click="stopGesture"><template #icon><i data-lucide="square"></i></template>停止识别</n-button><n-button secondary @click="simulateIncomingCall"><template #icon><i data-lucide="phone-incoming"></i></template>模拟来电</n-button><n-button quaternary @click="refreshAll"><template #icon><i data-lucide="refresh-cw"></i></template>刷新</n-button></div></div>
                <div class="cockpit-module agent-panel" @click="window.open('/alerts.html','_blank')"><div class="agent-copy"><div class="agent-kicker"><i data-lucide="shield-alert"></i><span>Agent 预警</span></div><h3>{{alerts[0]?.title||alerts[0]?.rule_name||driverAssist.title}}</h3><p>{{plainText(alerts[0]?.summary||alerts[0]?.message||alerts[0]?.reason||driverAssist.advice)}}</p></div><div class="agent-count"><strong>{{alertTotal}}</strong><span>累计告警</span></div></div>
              </section>
              <section class="driver-core">
                <div class="cockpit-module road-module"><div class="module-head"><div class="module-title"><i data-lucide="camera"></i><div><h2>车外视角</h2><p>行车记录、车牌辅助与 Agent 场景分析</p></div></div><span class="signal" :class="driverAssist.level==='ERROR'||driverAssist.level==='CRITICAL'?'error':'on'">{{driverAssist.level||'READY'}}</span></div><div class="road-stage"><canvas v-show="dashcamLocal.active" ref="dashcamCanvas" width="1280" height="720" aria-label="本地视频识别画面"></canvas><img v-show="!dashcamLocal.active" :src="dashcamViewUrl" alt="车外行车记录仪画面"><button class="road-nav prev" title="上一路摄像头" @click="prevDashcam"><i data-lucide="chevron-left"></i></button><button class="road-nav next" title="下一路摄像头" @click="nextDashcam"><i data-lucide="chevron-right"></i></button><div v-if="driverAssist.advice" class="assist-banner"><b>{{driverAssist.title}}</b><span>{{driverAssist.advice}}</span></div><div class="overlay"><span>{{dashcamDisplayName}}</span><span>{{dashcamDisplayUrl}}</span></div></div><div class="road-footer"><n-select v-model:value="dashcamCameraId" :options="cameraOptions" @update:value="showDashcam"></n-select><n-button secondary :loading="loading.localVideo" @click="chooseDashcamFile"><template #icon><i data-lucide="folder-open"></i></template>本地视频</n-button><n-button v-if="dashcamLocal.active" quaternary @click="clearDashcamVideo"><template #icon><i data-lucide="x"></i></template>退出视频</n-button><n-button type="primary" :loading="loading.driverAssist" @click="analyzeDashcam('traffic_police')"><template #icon><i data-lucide="shield-check"></i></template>Agent 分析</n-button><input ref="dashcamFileInput" class="hidden" type="file" accept="video/mp4,video/x-msvideo,video/quicktime,video/x-matroska,video/webm" @change="onDashcamFile"></div></div>
                <div class="driver-stack">
                  <div class="cockpit-module cabin-module" :class="{expanded:cabinExpanded}"><div class="module-head"><div class="module-title"><i data-lucide="scan-face"></i><div><h3>车内摄像头</h3><p>车主手势控车</p></div></div><div class="line"><span class="signal" :class="gesture.running?'on':''">{{gesture.running?'识别中':'未启动'}}</span><n-button size="tiny" quaternary :title="cabinExpanded?'还原画面':'放大画面'" @click="toggleCabinExpanded"><template #icon><i :data-lucide="cabinExpanded?'minimize-2':'maximize-2'"></i></template></n-button></div></div><div class="cabin-view"><img :src="gestureViewUrl" alt="车内手势识别画面"><div v-if="gesture.running&&!gesture.controlEnabled" class="control-lock"><b>手势控制未开启</b><span>张掌、抓握、握拳后启用</span></div><div class="overlay"><span>{{gesture.controlEnabled?'控制开启':'控制关闭'}}</span><span>{{gestureMirror?'镜像':'原始'}}</span></div></div><div class="cabin-actions"><div class="state-tags"><n-switch v-model:value="gestureMirror" size="small"><template #checked>镜像</template><template #unchecked>原始</template></n-switch></div><n-button size="small" secondary @click="simulateIncomingCall"><template #icon><i data-lucide="phone"></i></template>模拟电话</n-button></div><div class="phone-call" :class="{'hidden-call':phone.status==='idle'}"><div class="phone-info"><div class="phone-avatar">{{phone.caller.slice(0,1)}}</div><div><b>{{phone.caller}}</b><span>{{phone.status==='incoming'?'来电中':'通话中'}}</span></div></div><div class="phone-actions"><n-button v-if="phone.status==='incoming'" type="primary" circle @click="answerCall"><template #icon><i data-lucide="phone-call"></i></template></n-button><n-button type="error" circle @click="hangupCall"><template #icon><i data-lucide="phone-off"></i></template></n-button></div></div></div>
                  <div class="cockpit-module vehicle-module"><div class="module-head"><div class="module-title"><i data-lucide="sliders-horizontal"></i><div><h3>模拟车辆控制</h3><p>手势动作映射状态</p></div></div></div><div class="vehicle-body"><div class="vehicle-row"><label>音量</label><n-slider v-model:value="vehicle.volume" :min="0" :max="100"></n-slider></div><div class="vehicle-row"><label>温度</label><n-input-number v-model:value="vehicle.temperature" :min="16" :max="30"></n-input-number></div><div class="vehicle-row"><label>灯光</label><n-switch v-model:value="vehicle.light"><template #checked>开启</template><template #unchecked>关闭</template></n-switch></div></div></div>
                  <div class="cockpit-module music-module"><div class="module-head"><div class="module-title"><i data-lucide="music-2"></i><div><h3>音乐播放</h3><p>手势切换曲目与播放状态</p></div></div><span class="signal" :class="music.playing?'on':''">{{music.playing?'播放中':'已暂停'}}</span></div><div class="music-body"><div class="now-playing"><div class="track-copy"><b>{{currentTrack.title}}</b><span>{{currentTrack.artist}} · {{music.current+1}} / {{tracks.length}}</span></div><span class="play-state">{{music.lastGesture||'等待手势'}}</span></div><div class="music-progress"><span :style="{width:currentTrack.progress+'%'}"></span></div><div class="music-controls"><n-button secondary @click="previousTrack('按钮')"><template #icon><i data-lucide="skip-back"></i></template></n-button><n-button type="primary" @click="music.playing=!music.playing"><template #icon><i :data-lucide="music.playing?'pause':'play'"></i></template></n-button><n-button secondary @click="nextTrack('按钮')"><template #icon><i data-lucide="skip-forward"></i></template></n-button></div></div></div>
                </div>
              </section>
                <div class="panel traffic-test-panel">
                  <div class="head"><div class="title"><div class="ico"><i data-lucide="traffic-cone"></i></div><div><h3>交警手势算法测试</h3><p class="hint">上传测试视频，实时查看姿态骨架与优化 BiLSTM 分类结果。</p></div></div><div class="line"><n-tag :type="trafficTest.running?'success':trafficTest.error?'error':trafficTest.completed?'info':'default'">{{trafficTest.running?'识别中':trafficTest.error?'识别异常':trafficTest.completed?'识别完成':'待测试'}}</n-tag><n-button tertiary @click="chooseTrafficVideo"><template #icon><i data-lucide="folder-open"></i></template>选择视频</n-button></div></div>
                  <input ref="trafficFileInput" class="hidden" type="file" accept="video/mp4,video/x-msvideo,video/quicktime,video/x-matroska,video/webm" @change="onTrafficVideo">

      async function startOptimizedTrafficVideo(){const file=dashcamLocal.file;if(!file)return message.warning('请先选择本地视频');if(dashcamSocket){dashcamSocket.close();dashcamSocket=null}loading.trafficPolice=true;dashcamLocal.mode='traffic';dashcamLocal.gesture='';dashcamLocal.progress=0;driverAssist.level='INFO';driverAssist.title='正在上传优化交警视频';driverAssist.advice='上传完成后将立即逐帧显示姿态骨架和 BiLSTM 识别结果。';const form=new FormData();form.append('file',file);try{const uploaded=await api('/api/traffic-police/optimized-video',{method:'POST',body:form}),videoId=uploaded.data?.video_id;if(!videoId)throw new Error('后端未返回视频编号');const protocol=location.protocol==='https:'?'wss:':'ws:',socket=new WebSocket(`${protocol}//${location.host}/api/traffic-police/optimized-live`);dashcamSocket=socket;socket.onopen=()=>socket.send(JSON.stringify({video_id:videoId}));socket.onmessage=event=>{if(socket!==dashcamSocket)return;const data=JSON.parse(event.data);if(data.type==='status'){driverAssist.title=data.message;driverAssist.advice='优化模型按帧处理，结果会持续显示在当前播放器。';return}if(data.type==='error'){loading.trafficPolice=false;driverAssist.level='ERROR';driverAssist.title='优化交警手势识别失败';driverAssist.advice=data.message||'模型处理失败';return}if(data.type==='ended'){loading.trafficPolice=false;dashcamLocal.progress=100;driverAssist.title='优化交警手势视频识别完成';driverAssist.advice=`已实时处理 ${data.frames||0} 帧。`;return}if(data.type!=='frame')return;drawDashcamFrame(data.frame);loading.trafficPolice=false;dashcamLocal.gesture=data.gesture?.name||'无手势';dashcamLocal.progress=Math.round((data.progress||0)*100);dashcamLocal.inferenceMs=data.gesture?.inference_ms||0;driverAssist.level='INFO';driverAssist.title=`交警手势：${dashcamLocal.gesture}`;driverAssist.advice=`置信度 ${Math.round((data.gesture?.confidence||0)*100)}% · 第 ${data.frame_index}/${data.total_frames} 帧`};socket.onerror=()=>{if(socket!==dashcamSocket)return;loading.trafficPolice=false;driverAssist.level='ERROR';driverAssist.title='优化交警手势连接失败';driverAssist.advice='请检查 TPHSR 模型和主后端。'};socket.onclose=()=>{if(socket===dashcamSocket)dashcamSocket=null}}catch(e){loading.trafficPolice=false;driverAssist.level='ERROR';driverAssist.title='优化交警手势启动失败';driverAssist.advice=e.data?.detail||e.message||'请检查 TPHSR 优化模型'}finally{icons()}}
      async function startOptimizedTrafficCamera(){const cam=dashcamCamera.value;if(!cam)return message.warning('请先选择车外摄像头');if(dashcamSocket){dashcamSocket.close();dashcamSocket=null}loading.trafficPolice=true;dashcamLocal.active=true;dashcamLocal.file=null;dashcamLocal.mode='camera';dashcamLocal.gesture='';dashcamLocal.progress=0;dashcamVideoName.value=cam.name;driverAssist.level='INFO';driverAssist.title='正在连接优化交警手势摄像头';driverAssist.advice='摄像头采集持续运行，模型只处理最新帧。';const protocol=location.protocol==='https:'?'wss:':'ws:',socket=new WebSocket(`${protocol}//${location.host}/api/traffic-police/optimized-camera-live`);dashcamSocket=socket;socket.onopen=()=>socket.send(JSON.stringify({source_url:cam.rtsp_url,camera_index:0}));socket.onmessage=event=>{if(socket!==dashcamSocket)return;const data=JSON.parse(event.data);if(data.type==='status'){driverAssist.title=data.message;return}if(data.type==='error'){loading.trafficPolice=false;driverAssist.level='ERROR';driverAssist.title='优化交警摄像头识别失败';driverAssist.advice=data.message||'视频源不可用';return}if(data.type!=='frame')return;drawDashcamFrame(data.frame);loading.trafficPolice=false;dashcamLocal.gesture=data.gesture?.name||'无手势';dashcamLocal.progress=data.processing_fps||0;dashcamLocal.inferenceMs=data.gesture?.inference_ms||0;driverAssist.level='INFO';driverAssist.title=`交警手势：${dashcamLocal.gesture}`;driverAssist.advice=`置信度 ${Math.round((data.gesture?.confidence||0)*100)}% · ${data.processing_fps||0} FPS · 丢弃 ${data.dropped_frames||0} 帧`};socket.onerror=()=>{if(socket!==dashcamSocket)return;loading.trafficPolice=false;driverAssist.level='ERROR';driverAssist.title='优化交警摄像头连接失败';driverAssist.advice='请检查 RTSP 地址、TPHSR 模型和主后端。'};socket.onclose=()=>{if(socket===dashcamSocket)dashcamSocket=null};icons()}
      async function startTrafficPolice(){if(dashcamLocal.active&&dashcamLocal.file)return startOptimizedTrafficVideo();return startOptimizedTrafficCamera()}
      async function sendGesture(type,label){try{gestureResult.value=await api('/api/gesture/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:'demo',gesture_type:type,gesture_label:label,confidence:.92,stable:true})});const cmd=gestureResult.value?.data?.command||{},a=cmd.action;if(typeof cmd.gesture_control_enabled==='boolean')gesture.controlEnabled=cmd.gesture_control_enabled;if(a==='control_toggle'){message.success(gesture.controlEnabled?'控制已开启':'控制已关闭');icons();return}if(cmd.action_applied===false){message.warning('控制关闭，已忽略手势');return}if(a==='left')previousTrack('左滑');if(a==='right')nextTrack('右滑');if(a==='music_toggle')toggleMusic();if(a==='lights_on')vehicle.light=true;if(a==='lights_off')vehicle.light=false;if(a==='phone_answer'||a==='phone_hangup')applyPhoneAction(a);if(a==='confirm'||type==='circle')vehicle.volume=Math.min(100,vehicle.volume+8);message.success(label)}catch(e){gestureResult.value=e}}
      async function simulateAlert(){try{await api('/api/logs/simulate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scenario:scenario.value})});await loadAlerts();message.success('告警已生成')}catch{message.error('告警模拟失败')}}
      function plainText(s){return(s||'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/`(.+?)`/g,'$1')}
      function switchToAlertsTab(){adminTab.value='alerts';loadAlertStats();loadTimelineAlerts();nextTick(()=>{icons();drawAlertCharts()})}
      async function loadAlertStats(){try{const r=await api('/api/alerts/stats?trend_hours=24');Object.assign(alertStats,r.data||r)}catch{}drawAlertCharts()}
      async function loadTimelineAlerts(){try{const r=await api('/api/alerts?page_size=50');const items=Array.isArray(r.data)?r.data:(r.data?.items||[]);timelineAlerts.value=items.sort((a,b)=>new Date(a.created_at+'Z')-new Date(b.created_at+'Z'))}catch{timelineAlerts.value=[]}}
      async function selectTimelineAlert(item){try{const r=await api(`/api/alerts/${item.id}`);selectedTimelineAlert.value=r.data||r}catch{selectedTimelineAlert.value=item}nextTick(()=>icons())}
      async function ackTimelineAlert(id){try{await api(`/api/alerts/${id}/acknowledge`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ack_user:sessionUser.value?.username||'admin'})});message.success('已确认');await loadTimelineAlerts();const found=timelineAlerts.value.find(a=>a.id===id);if(found)selectTimelineAlert(found)}catch{message.error('确认失败')}}
      async function resolveTimelineAlert(id){try{await api(`/api/alerts/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'RESOLVED'})});message.success('已标记为已解决');await loadTimelineAlerts();const found=timelineAlerts.value.find(a=>a.id===id);if(found)selectTimelineAlert(found)}catch{message.error('操作失败')}}
      async function unackTimelineAlert(id){try{await api(`/api/alerts/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'UNREAD'})});message.success('已撤销');await loadTimelineAlerts();const found=timelineAlerts.value.find(a=>a.id===id);if(found)selectTimelineAlert(found)}catch{message.error('操作失败')}}
      async function jumpToAlert(id){adminTab.value='alerts';try{const r=await api(`/api/alerts/${id}`);selectedTimelineAlert.value=r.data||r;await loadTimelineAlerts()}catch{}nextTick(()=>{icons();drawAlertCharts()})}
      function formatTimelineTime(ts){if(!ts)return'';try{const d=new Date(ts+'Z');return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}catch{return ts}}
      function statusLabel(s){const m={UNREAD:'未确认',READ:'已读',ACKNOWLEDGED:'已确认',RESOLVED:'已解决'};return m[s]||s||'未确认'}
      async function loadReplayData(){try{const params=new URLSearchParams({page_size:'200',page:'1'});const r=await api(`/api/alerts?${params}`);const items=Array.isArray(r.data)?r.data:(r.data?.items||[]);replay.alerts=items.reverse();replay.index=0}catch{message.error('加载回放数据失败')}}
      function replayToggle(){if(replay.playing){clearInterval(replay.timer);replay.playing=false}else{replay.playing=true;replay.timer=setInterval(()=>{if(replay.index<replay.alerts.length-1)replay.index++;else{replay.index=0;clearInterval(replay.timer);replay.playing=false}},2000/replay.speed)}}
      function replayStep(d){replay.index=Math.max(0,Math.min(replay.alerts.length-1,replay.index+d))}
      function replayGo(i){replay.index=i}
      function drawAlertCharts(){nextTick(()=>{const byLevel=alertStats.by_level||{};if(alertLevelChart.value){const w=alertLevelChart.value.offsetWidth;if(w>0){if(alertLevelChartInst)alertLevelChartInst.dispose();alertLevelChartInst=echarts.init(alertLevelChart.value);alertLevelChartInst.setOption({tooltip:{trigger:'axis'},grid:{left:36,right:12,top:20,bottom:24},xAxis:{type:'category',data:['WARNING','ERROR','CRITICAL']},yAxis:{type:'value',minInterval:1},series:[{type:'bar',data:[byLevel.WARNING||0,byLevel.ERROR||0,byLevel.CRITICAL||0],itemStyle:{borderRadius:[6,6,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#18d4c3'},{offset:1,color:'#0a6b63'}])}}]})}}if(alertModuleChart.value){const w=alertModuleChart.value.offsetWidth;if(w>0){if(alertModuleChartInst)alertModuleChartInst.dispose();alertModuleChartInst=echarts.init(alertModuleChart.value);const bm=alertStats.by_module||{};const d=Object.entries(bm).map(([n,c])=>({name:n,value:c})).sort((a,b)=>b.value-a.value);alertModuleChartInst.setOption({tooltip:{trigger:'item'},legend:{bottom:0,textStyle:{color:'#8290a3',fontSize:10}},series:[{type:'pie',radius:['50%','74%'],center:['50%','44%'],data:d.length?d:[{name:'暂无数据',value:1}],color:['#18d4c3','#4d8dff','#f3b64b','#ff655d','#a78bfa','#34d399']}]})}}})}
      function plainText(s){return(s||'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/`(.+?)`/g,'$1')}
      function drawCharts(){nextTick(()=>{const s={info:0,warning:0,error:0,critical:0};alerts.value.forEach(i=>{const k=(i.level||'info').toLowerCase();s[k]=(s[k]||0)+1});if(adminChart.value){const w=adminChart.value.offsetWidth;if(w>0){if(adminChartInstance)adminChartInstance.dispose();adminChartInstance=echarts.init(adminChart.value);adminChartInstance.setOption({tooltip:{},grid:{left:28,right:12,top:24,bottom:24},xAxis:{type:'category',data:['警告','错误','严重']},yAxis:{type:'value',minInterval:1},series:[{type:'bar',data:[s.warning,s.error,s.critical],itemStyle:{borderRadius:[8,8,0,0],color:'#0f9f8f'}}]})}}if(driverChart.value){const w=driverChart.value.offsetWidth;if(w>0){if(driverChartInstance)driverChartInstance.dispose();driverChartInstance=echarts.init(driverChart.value);driverChartInstance.setOption({tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['46%','70%'],center:['50%','42%'],data:[{name:'车牌辅助',value:plateCount.value||1},{name:'手势控车',value:gesture.running?3:1},{name:'Agent',value:Math.max(alertTotal.value,1)}],color:['#0f9f8f','#3c74d8','#ef6f5e']}]})}}})}
      watch([role,alerts,()=>music.current,()=>music.playing],()=>{icons();drawCharts()});watch([()=>vehicle.volume,()=>vehicle.temperature,()=>vehicle.light],scheduleVehiclePreferenceSave);watch(()=>replay.speed,(v)=>{if(replay.playing){clearInterval(replay.timer);replay.timer=setInterval(()=>{if(replay.index<replay.alerts.length-1)replay.index++;else{clearInterval(replay.timer);replay.playing=false}},2000/v)}});watch(adminTab,(v)=>{if(v==='alerts'){nextTick(()=>{drawAlertCharts()})}});onMounted(async()=>{const saved=await readSecure('irv-session',null);if(saved?.user){sessionUser.value=saved.user;authToken.value=saved.token||'';role.value=saved.user.role||'driver';auth.role=role.value;isAuthed.value=true;await loadVehiclePreferences()}else fillDemo(false);icons();motion();await Promise.all([loadHealth(),loadCameras(),loadAlerts()]);drawCharts();if(role.value==='admin'){loadAlertStats();loadTimelineAlerts();loadReplayData()}icons();addEventListener('resize',()=>{adminChartInstance?.resize();driverChartInstance?.resize();alertLevelChartInst?.resize();alertModuleChartInst?.resize()})});onBeforeUnmount(()=>{if(preferenceSaveTimer)clearTimeout(preferenceSaveTimer);stopGesturePolling();clearDashcamVideo();stopTrafficTest(false);if(replay.timer)clearInterval(replay.timer);if(previewUrl.value)URL.revokeObjectURL(previewUrl.value)});
      return{placeholder,darkTheme,isAuthed,sessionUser,auth,role,health,cameras,selectedCameraId,cameraViewUrl,dashcamCameraId,dashcamViewUrl,dashcamVideoUrl,dashcamFileInput,dashcamCanvas,dashcamExpanded,dashcamLocal,driverAssist,trafficFileInput,trafficCanvas,trafficTest,trafficStats,plateResult,plateUploadResult,fileName,fileInput,previewUrl,previewType,alerts,alertTotal,scenario,scenarioOptions,gesture,gestureSrc,cameraIndex,gestureMirror,gestureViewUrl,gestureResult,cabinExpanded,vehicle,phone,tracks,music,currentTrack,adminChart,driverChart,loading,theme,selectedCamera,dashcamCamera,cameraOptions,agentRunning,cameraName,cameraUrl,dashcamName,dashcamUrl,dashcamDisplayName,dashcamDisplayUrl,plateCount,pretty,tagType,switchAuthMode,switchAuthMethod,chooseAuthRole,fillDemo,sendAuthCode,submitAuth,logout,refreshAll,selectCamera,showCamera,showDashcam,chooseDashcamFile,onDashcamFile,clearDashcamVideo,prevDashcam,nextDashcam,analyzeDashcam,chooseTrafficVideo,onTrafficVideo,startTrafficTest,stopTrafficTest,snapshotCamera,runPlateStream,chooseFile,onFile,recognizePlateImage,recognizePlateVideo,clearFilePreview,recognizeCurrentFile,startGestureWebcam,startGestureRtsp,stopGesture,sendGesture,toggleCabinExpanded,previousTrack,nextTrack,simulateIncomingCall,answerCall,hangupCall,simulateAlert,loadAlerts,plainText,adminTab,alertStats,timelineAlerts,selectedTimelineAlert,criticalAlerts,alertLevelChart,alertModuleChart,switchToAlertsTab,loadAlertStats,loadTimelineAlerts,selectTimelineAlert,ackTimelineAlert,resolveTimelineAlert,unackTimelineAlert,jumpToAlert,formatTimelineTime,statusLabel,replay,speedOptions,currentReplay,loadReplayData,replayToggle,replayStep,replayGo}
    }}).use(naive).mount('#app');
