<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IRV - 自定义手势设置</title>
  <style>
    :root{--ink:#e7eef5;--muted:#8a9bad;--line:#263544;--brand:#15b8a6;--brand-strong:#0f8f83;--surface:#101821;--surface-2:#151f2a;--bg:#070b10;--danger:#ff7474;--blue:#66a6ff}
    *{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg)}
    main{max-width:1120px;margin:auto;padding:28px 18px 56px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:16px}.top h1{margin:0;font-size:24px;letter-spacing:0}.top p{margin:4px 0 0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px}.card{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:18px;box-shadow:0 14px 32px #0005}.card h2{margin:0 0 6px;font-size:17px;letter-spacing:0}.hint{color:var(--muted);font-size:13px;margin:0 0 16px}.form{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:grid;gap:6px;font-weight:600}input,select,button{font:inherit}input,select{width:100%;padding:10px 11px;border:1px solid #344658;border-radius:5px;background:#0b1219;color:var(--ink);outline:none}input:focus,select:focus{border-color:var(--brand)}button{border:1px solid #344658;border-radius:5px;padding:9px 13px;cursor:pointer;background:var(--surface-2);color:var(--ink);font-weight:700}button:hover{border-color:#4b6278;background:#1a2734}button.primary{border-color:var(--brand);background:var(--brand-strong);color:#fff}button.danger{color:var(--danger);border-color:#68383d;background:#27171a}button:disabled{opacity:.45;cursor:not-allowed}.actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.status{min-height:24px;margin:12px 0 0;color:var(--muted)}.status.error{color:var(--danger)}.status.ok{color:#48d4c4}.candidate{margin-top:14px;padding:13px;border-radius:6px;background:#0c2927;border:1px solid #1d615b}.candidate strong{font-size:16px}.hidden{display:none}.bindings{display:grid;gap:9px}.binding{border:1px solid var(--line);border-radius:6px;padding:13px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:#0d141c}.binding h3{margin:0;font-size:15px}.binding p{margin:4px 0 0;color:var(--muted);font-size:12px}.badges{display:flex;gap:6px;flex-wrap:wrap}.badge{padding:3px 7px;border-radius:999px;background:#123532;color:#55d7c8;font-size:12px}.badge.off{background:#202a34;color:#8694a3}.bind-actions{display:flex;gap:7px}.bind-actions button{padding:7px 9px;font-size:12px}.camera{margin-top:14px;overflow:hidden;border-radius:6px;border:1px solid var(--line);background:#05080c}.camera img{display:block;width:100%;max-height:360px;object-fit:contain;background:#05080c}.reserved{margin-top:12px;max-height:220px;overflow:auto;display:flex;gap:6px;flex-wrap:wrap}.reserved span{font-size:12px;border-radius:999px;padding:4px 8px;background:#1b2631;color:#8292a3}.reserved span.free{background:#102d2b;color:#4fd2c3}@media(max-width:820px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.binding{grid-template-columns:1fr}.bind-actions{flex-wrap:wrap}}
  </style>
</head>
<body>
  <main>
    <div class="top"><div><h1>自定义手势控车</h1><p>仅可绑定未被系统静态或动态手势占用的类别。绑定仅保存识别结果，不保存图片和摄像头画面。</p></div><button id="back">返回驾驶舱</button></div>
    <div class="grid">
      <section class="card"><h2>创建控车事件</h2><p class="hint">先定义事件和动作，再选择上传图片或摄像头二次验证。</p>
        <div class="form"><div class="row"><label>事件名称<input id="event-name" maxlength="64" placeholder="例如：打开氛围灯"></label><label>控车动作<select id="action-code"></select></label></div>
          <div class="actions"><button class="primary" id="image-start">上传手势图片</button><input class="hidden" id="image-file" type="file" accept="image/*"><button class="primary" id="camera-start">摄像头录入</button></div>
        </div>
        <div id="image-candidate" class="candidate hidden"><strong id="image-gesture"></strong><p id="image-info"></p><div class="actions"><button class="primary" id="image-confirm">确认并绑定</button><button id="image-cancel">取消</button></div></div>
        <div id="camera-panel" class="hidden"><div class="camera"><img id="camera-video" alt="后端标记后的手势摄像头画面"></div><p class="hint" style="margin-top:8px">后端摄像头正在识别，画面中的手部标记和标签与手势控车页面保持一致。</p><div id="camera-candidate" class="candidate hidden"><strong id="camera-gesture"></strong><p id="camera-info"></p><button class="primary" id="camera-confirm">确认该手势，进行二次验证</button></div><div class="actions" style="margin-top:10px"><button id="camera-stop">停止摄像头</button></div></div>
        <div id="status" class="status"></div>
      </section>
      <aside class="card"><h2>已绑定手势</h2><p class="hint">开关可立即生效；修改动作或名称不会改变已验证手势。</p><div id="bindings" class="bindings"></div></aside>
    </div>
    <section class="card" style="margin-top:18px"><h2>可用性提示</h2><p class="hint">以下标签由识别模型提供。灰色为系统保留，绿色可用于绑定；最终仍由后端校验。</p><div id="catalog" class="reserved"></div></section>
  </main>
  <script>
    const $=id=>document.getElementById(id),statusEl=$('status'),state={token:'',actions:[],cameraSession:'',cameraTimer:null,gestureStreamStarted:false,imageDraft:''};
    const enc=new TextEncoder(),dec=new TextDecoder(),subtle=window.crypto&&crypto.subtle;let keyPromise;
    const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b))),unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
    async function key(){if(!subtle)return null;if(!keyPromise){const material=await subtle.importKey('raw',enc.encode('IRV-auth-local-demo-secret'),'PBKDF2',false,['deriveKey']);keyPromise=subtle.deriveKey({name:'PBKDF2',salt:enc.encode('IRV-privacy-salt-v1'),iterations:120000,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}return keyPromise}
    async function session(){const raw=localStorage.getItem('irv-session');if(!raw)return null;try{const box=JSON.parse(raw);if(box.alg!=='AES-GCM')return box;const k=await key();if(!k)return null;return JSON.parse(dec.decode(await subtle.decrypt({name:'AES-GCM',iv:unb64(box.iv)},k,unb64(box.data))))}catch{return null}}
    async function api(url,opt={}){const headers={...(opt.headers||{}),Authorization:'Bearer '+state.token};const r=await fetch(url,{...opt,headers});const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.detail||data.message||'请求失败');return data.data}
    function setStatus(text='',kind=''){statusEl.textContent=text;statusEl.className='status '+kind}
    function formValues(){const display_name=$('event-name').value.trim(),action_code=$('action-code').value;if(!display_name)throw new Error('请填写事件名称');if(!action_code)throw new Error('请选择控车动作');return{display_name,action_code}}
    function actionLabel(code){return state.actions.find(x=>x.code===code)?.label||code}
    async function load(){const [catalog,bindings]=await Promise.all([api('/api/gesture-custom/catalog'),api('/api/gesture-custom/bindings')]);state.actions=catalog.actions;$('action-code').innerHTML=catalog.actions.map(x=>`<option value="${x.code}">${x.label}</option>`).join('');$('catalog').innerHTML=catalog.gestures.map(x=>`<span class="${x.reserved?'':'free'}" title="${x.reason||'可绑定'}">${x.key}</span>`).join('');renderBindings(bindings)}
    function renderBindings(items){const root=$('bindings');if(!items.length){root.innerHTML='<p class="hint">还没有自定义绑定。</p>';return}root.innerHTML=items.map(x=>`<div class="binding"><div><h3>${escapeHtml(x.display_name)}</h3><p>手势：${x.gesture_key} · 动作：${x.action_label} · ${x.source==='image'?'图片':'摄像头'}</p><div class="badges"><span class="badge ${x.enabled?'':'off'}">${x.enabled?'已启用':'已停用'}</span><span class="badge">触发 ${x.trigger_count} 次</span></div></div><div class="bind-actions"><button data-toggle="${x.id}" data-on="${x.enabled}">${x.enabled?'停用':'启用'}</button><button data-edit="${x.id}" data-name="${escapeAttr(x.display_name)}" data-action="${x.action_code}">编辑</button><button class="danger" data-delete="${x.id}">删除</button></div></div>`).join('')}
    function escapeHtml(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escapeAttr(v){return escapeHtml(v).replace(/'/g,'&#39;')}
    async function refreshBindings(){renderBindings(await api('/api/gesture-custom/bindings'))}
    async function startImage(){try{const v=formValues();$('image-file').value='';$('image-file').click();$('image-file').onchange=async()=>{const file=$('image-file').files[0];if(!file)return;setStatus('正在检测图片中的手势...');const f=new FormData();f.append('file',file);f.append('display_name',v.display_name);f.append('action_code',v.action_code);const result=await api('/api/gesture-custom/drafts/image',{method:'POST',body:f});state.imageDraft=result.draft_id||'';const detected=result.gesture_key||'未检测到唯一手势';$('image-gesture').textContent=`识别结果：${detected}`;const score=result.classifier_confidence??result.confidence;const metrics=score===undefined?'':`分类置信度 ${Math.round(score*100)}%，手部检测 ${Math.round((result.detector_confidence??0)*100)}%。`;const allowed=result.can_bind===true;$('image-info').textContent=allowed?`${metrics}确认后将执行“${result.action_label}”。`:(result.reason||'该图片暂不能用于绑定。');$('image-confirm').disabled=!allowed;$('image-candidate').classList.remove('hidden');setStatus(allowed?'请核对识别结果后确认。':'已展示识别结果，请按提示更换图片。',allowed?'ok':'error')}}catch(e){setStatus(e.message,'error')}}
    async function confirmImage(){try{const binding=await api('/api/gesture-custom/drafts/image/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({draft_id:state.imageDraft})});$('image-candidate').classList.add('hidden');setStatus(`已绑定“${binding.display_name}”。`,'ok');refreshBindings()}catch(e){setStatus(e.message,'error')}}
    async function startCamera(){try{const values=formValues();await stopCamera();const session=await api('/api/gesture-custom/camera-sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(values)});state.cameraSession=session.session_id;const stream=await api('/api/gesture/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({use_webcam:true,camera_index:0,mirror:true,src_url:null})});if(!stream.running)throw new Error(stream.error||'后端摄像头未能启动');state.gestureStreamStarted=true;$('camera-video').src=`${stream.mjpg_url||'/api/gesture/video-feed'}?t=${Date.now()}`;$('camera-panel').classList.remove('hidden');setStatus('后端摄像头已启动，请在标记画面中保持一只清晰手势。','ok');state.cameraTimer=setInterval(sendCameraFrame,250)}catch(e){setStatus(e.message||'后端摄像头无法启动','error');await stopCamera()}}
    async function sendCameraFrame(){if(!state.cameraSession)return;try{const result=await api(`/api/gesture-custom/camera-sessions/${state.cameraSession}/active-frame`,{method:'POST'});handleCamera(result)}catch(e){setStatus(e.message,'error');await stopCamera()}}
    function handleCamera(result){if(result.phase==='first_ready'){$('camera-gesture').textContent=`识别到：${result.gesture_key}`;$('camera-info').textContent=`置信度 ${Math.round(result.confidence*100)}%。确认后请先移开手，再做一次相同手势。`;$('camera-candidate').classList.remove('hidden');clearInterval(state.cameraTimer);state.cameraTimer=null;setStatus(result.message,'ok');return}if(result.phase==='bound'){setStatus(result.message,'ok');stopCamera().then(refreshBindings);return}if(result.phase==='await_hand_removed'||result.phase==='second_capture'){setStatus(result.message||'请完成二次验证。','ok');return}if(result.stable_count){setStatus(`正在确认稳定性：${result.stable_count}/${result.required_stable_count}（${result.gesture_key}）`)}else if(result.message){setStatus(result.message,'ok')}}
    async function confirmCamera(){try{const result=await api(`/api/gesture-custom/camera-sessions/${state.cameraSession}/confirm-first`,{method:'POST'});$('camera-candidate').classList.add('hidden');setStatus(result.message,'ok');state.cameraTimer=setInterval(sendCameraFrame,250)}catch(e){setStatus(e.message,'error')}}
    async function stopCamera(){if(state.cameraTimer){clearInterval(state.cameraTimer);state.cameraTimer=null}$('camera-video').removeAttribute('src');if(state.gestureStreamStarted){try{await api('/api/gesture/stop',{method:'POST'})}catch{}state.gestureStreamStarted=false}$('camera-panel').classList.add('hidden');state.cameraSession=''}
    async function bindingClick(e){const target=e.target, id=target.dataset.toggle||target.dataset.edit||target.dataset.delete;if(!id)return;try{if(target.dataset.delete){if(!confirm('删除后该手势不再触发控车事件，确定删除？'))return;await api(`/api/gesture-custom/bindings/${id}`,{method:'DELETE'})}else if(target.dataset.toggle){await api(`/api/gesture-custom/bindings/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:target.dataset.on!=='true'})})}else{const name=prompt('事件名称',target.dataset.name);if(name===null)return;const action=prompt('动作代码：'+state.actions.map(x=>x.code).join('、'),target.dataset.action);if(action===null)return;await api(`/api/gesture-custom/bindings/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_name:name,action_code:action})})}await refreshBindings();setStatus('已保存。','ok')}catch(err){setStatus(err.message,'error')}}
    $('back').onclick=()=>location.href='/';$('image-start').onclick=startImage;$('image-confirm').onclick=confirmImage;$('image-cancel').onclick=()=>{$('image-candidate').classList.add('hidden');state.imageDraft=''};$('camera-start').onclick=startCamera;$('camera-confirm').onclick=confirmCamera;$('camera-stop').onclick=stopCamera;$('bindings').onclick=bindingClick;
    (async()=>{const s=await session();if(!s?.token||s.user?.role!=='driver'){location.href='/';return}state.token=s.token;try{await load()}catch(e){setStatus(e.message,'error')}})();window.addEventListener('beforeunload',stopCamera);
  </script>
</body>
</html>
